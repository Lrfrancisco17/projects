---
- name: Render HTML report
  template:
    src: report.html.j2
    dest: /tmp/baseline_{{ inventory_hostname }}.html

- name: Read rendered HTML from remote host
  slurp:
    src: /tmp/baseline_{{ inventory_hostname }}.html
  register: html_content

- name: Send email from controller
  delegate_to: localhost
  community.general.mail:
    host: "{{ smtp_host }}"
    port: "{{ smtp_port }}"
    username: "{{ smtp_user }}"
    password: "{{ smtp_pass }}"
    to: "{{ email_to }}"
    from: "{{ email_from }}"
    subject: "Baseline Report - {{ inventory_hostname }}"
    subtype: html
    body: "{{ html_content.content | b64decode }}"
