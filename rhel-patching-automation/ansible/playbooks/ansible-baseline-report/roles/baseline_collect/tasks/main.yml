- name: Get OS release
  command: cat /etc/redhat-release
  register: os_release
  changed: false

- name: Get IP address
  command: hostname -I
  register: ip_address
  changed: false

- name: Get uptime
  command: uptime -p
  register: uptime
  changed: false

- name: Get disk usage for /
  command: df -h /
  register: disk_root
  changed: false

- name: Get disk usage for /var
  command: df -h /var
  register: disk_var
  changed: false

- name: Get disk usage for /boot
  command: df -h /boot
  register: disk_boot
  changed: false

- name: Get SELinux mode
  command: getenforce
  register: selinux
  changed: false

- name: Store structured results for aggregation
  set_fact:
    baseline_results_all: >-
      {{ baseline_results_all | default({}) |
         combine({
           inventory_hostname: {
             'hostname': inventory_hostname,
             'ip': ip_address.stdout,
             'os': os_release.stdout,
             'uptime': uptime.stdout,
             'disk_root': disk_root.stdout,
             'disk_var': disk_var.stdout,
             'disk_boot': disk_boot.stdout,
             'selinux': selinux.stdout
           }
         }) }}

